# =============================================================================
# Web App Deploy
# -----------------------------------------------------------------------------
# Updates the live web version of Cue Clock (hosted on Coolify, our deploy
# server) whenever a full release is published — so the website only changes
# on real releases, not on every master push, and it always serves the EXACT
# code that was tagged.
#
# Runs on:  a GitHub Release published as (or flipped to) a full release —
#           the same moment android-promote.yml ships to Play. Betas
#           (vX.Y.Z-beta.N) do NOT trigger this.
#
# How:      Coolify can only auto-deploy a *branch*, not a specific commit.
#           So this workflow points a dedicated `release` branch at the tagged
#           commit; Coolify watches that branch (not master) and auto-deploys
#           whenever it moves. The `release` branch is owned by this workflow
#           alone — no human ever commits to it — which is why force-pushing
#           it is safe and intentional.
#
# Setup (one-time, in the Coolify dashboard — cannot be done in CI):
#   1. On the web app resource, change the tracked branch `master` -> `release`.
#   2. Keep "Auto Deploy" ENABLED (it now only moves when a release is cut).
#   3. Set the resource's build command to `npm run build:web:deploy` — that
#      runs `app/scripts/derive-web-version.js` first, which stamps the latest
#      full GitHub release version into the footer.
#   No Coolify API token or secrets are required.
# =============================================================================
name: Web App Deploy

on:
  release:
    types: [released]

# Run deploys one at a time, in order — never cancel a deploy midway.
concurrency:
  group: web-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  mirror-release-branch:
    name: Mirror released tag to the deploy branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Force `release` branch to this exact tag
        # HEAD is the detached checkout at the released tag. Force-push makes
        # `release` byte-identical to it; Coolify (tracking `release`) then
        # auto-deploys this exact commit.
        run: git push origin "HEAD:refs/heads/release" --force
