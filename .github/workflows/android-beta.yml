# =============================================================================
# Android Beta (Open Testing)
# -----------------------------------------------------------------------------
# Builds the Android app from a beta tag and sends it to Google Play "Open
# Testing" â€” the public beta track anyone can join via the opt-in link.
#
# Runs on:  publishing a GitHub Release marked "pre-release". The tag MUST
#           look like vX.Y.Z-beta.N (e.g. v0.1.0-beta.1).
#
# Version:  the tag becomes the app's version name (the -beta.N suffix is kept
#           so testers can see exactly which beta they're on), and the build
#           timestamp becomes Google Play's required always-increasing version
#           code. The release description becomes the "What's new" text on Play.
#
# Output:   a signed app package (AAB) on the beta track, named
#           cue-clock-<version>. This EXACT file â€” unchanged â€” is what
#           android-promote.yml later moves to production, so what testers
#           validated is what users get.
#
# Related:  android-internal.yml (private builds on every master push),
#           android-promote.yml (moves this beta build to Production when the
#           release is flipped from pre-release to full release).
# =============================================================================
name: Android Beta (Open Testing)

on:
  # We listen to "published" and check the pre-release flag in the job below.
  # We do NOT use "prereleased": GitHub never fires it when a pre-release is
  # published from a DRAFT, which is exactly how the beta drafter creates them,
  # so this workflow would silently never run. Verified by experiment.
  release:
    types: [published]

# Serialize all beta builds so a fast second pre-release can't land before
# a slower first one (which would put an older versionName in front of testers).
concurrency:
  group: android-beta
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy to Open Testing
    runs-on: ubuntu-latest
    # Defense in depth: GitHub already only fires `prereleased` for pre-releases,
    # but a future trigger change shouldn't accidentally ship a full release here.
    if: github.event.release.prerelease == true

    steps:
      # Safety gate: refuse to build if the tag isn't a proper beta tag â€”
      # catches typos like v0.1.0 (a production tag) published as pre-release.
      - name: Validate beta tag shape
        env:
          VERSION_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$VERSION_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "Tag '$VERSION_TAG' does not match vX.Y.Z-beta.N. Refusing to build."
            exit 1
          fi

      # Strip the leading "v" from the tag â€” "v0.1.0-beta.1" â†’ "0.1.0-beta.1".
      - name: Extract version from tag
        id: version
        env:
          VERSION_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${VERSION_TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version string: $VERSION"

      # Google Play needs a number that only ever goes up; the current time in
      # seconds guarantees each build's code is higher than the last.
      - name: Generate version code
        id: version_code
        run: |
          VERSION_CODE="$(date +%s)"
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Generated version code: $VERSION_CODE"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pin to the tag SHA so the build is reproducible from the release,
          # regardless of any pushes to master between tag-push and workflow-run.
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      # Health check: warns about mismatched library versions. Advisory only
      # here (continue-on-error) â€” a warning must not block a beta release.
      - name: Run Expo Doctor
        working-directory: app
        run: npx expo-doctor
        continue-on-error: true

      # Write the version name/code decided above into the app's config files.
      - name: Update version code and name for release
        working-directory: app
        env:
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_CODE: ${{ steps.version_code.outputs.version_code }}
        run: |
          node scripts/prepare-android-release.js

      # Build-time settings the app needs, pulled from repository secrets so
      # they never appear in the public repo.
      - name: Create .env with build-time secrets
        working-directory: app
        run: |
          echo "EXPO_PUBLIC_CLARITY_KEY=${{ secrets.EXPO_PUBLIC_CLARITY_KEY }}" > .env
          echo "EAS_PROJECT_ID=${{ secrets.EAS_PROJECT_ID }}" >> .env
          echo "EAS_OWNER=${{ secrets.EAS_OWNER }}" >> .env

      # Recreate google-services.json (the Firebase config file, kept out of
      # the public repo) from a repository secret.
      - name: Decode Firebase config
        working-directory: app
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > google-services.json

      # Generate the native Android project folder from the Expo config â€”
      # this is what Gradle actually builds in the next steps.
      - name: Generate Android native project
        working-directory: app
        run: |
          export EAS_PROJECT_ID=${{ secrets.EAS_PROJECT_ID }}
          export EAS_OWNER=${{ secrets.EAS_OWNER }}
          export EXPO_PUBLIC_CLARITY_KEY=${{ secrets.EXPO_PUBLIC_CLARITY_KEY }}
          npx expo prebuild --platform android --clean

      # Prebuild regenerates the native project, wiping the version stamped
      # earlier â€” so stamp it again directly into the native files.
      - name: Sync Android native version after prebuild
        working-directory: app
        env:
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_CODE: ${{ steps.version_code.outputs.version_code }}
        run: |
          node scripts/prepare-android-release.js --sync-native

      # Recreate the app-signing key from a secret. Google Play only accepts
      # updates signed with this exact key, so it must never be lost or leaked.
      - name: Decode keystore
        working-directory: app/android
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release AAB
        working-directory: app/android
        run: |
          # ARM-only: every real Android phone is ARM. Shipping x86/x86_64
          # native splits only served emulators/ChromeOS a broken bundle â€”
          # the x86_64 split was missing libc++_shared.so, fatally crashing
          # RN's New Architecture at MainApplication.onCreate (Crashlytics:
          # SoLoaderDSONotFoundError). Dropping them also shrinks the AAB.
          ./gradlew bundleRelease \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      # Turn the GitHub release description into plain text for Google Play's
      # "What's new" box: strip markdown formatting and keep it under Play's
      # 500-character limit without cutting a word in half.
      - name: Generate Clean Release Notes
        working-directory: app
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          node -e "
          const fs = require('fs');
          let notes = process.env.RELEASE_BODY;

          // 1. Fallback for manual triggers
          if (!notes || notes.trim() === '') {
            notes = 'Bug fixes and performance improvements for Cue Clock.';
          }

          // 2. Convert markdown into plain text while preserving line breaks for Google Play
          notes = notes.replace(/\r\n/g, '\n');
          notes = notes.replace(/\[([^\]]+)\]\([^)]+\)/g, '\$1'); // Converts [Link Text](https://...) to just 'Link Text'
          notes = notes.replace(/^\s{0,3}#{1,6}\s*/gm, ''); // Removes markdown heading markers only
          notes = notes.replace(/^\s*[*+-]\s+/gm, 'â€˘ '); // Converts markdown bullets to readable bullets
          notes = notes.replace(/^\s*\d+\.\s+/gm, 'â€˘ '); // Converts numbered lists to readable bullets
          notes = notes.replace(/\*\*([^*]+)\*\*/g, '\$1'); // Removes bold markers while keeping text
          notes = notes.replace(/__([^_]+)__/g, '\$1');
          notes = notes.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '\$1'); // Removes italic markers without touching bullets
          notes = notes.replace(/(?<!_)_([^_\n]+)_(?!_)/g, '\$1');
          notes = notes.replace(/[~\`>]/g, ''); // Removes remaining markdown syntax
          notes = notes.replace(/^\s*--\s*$/gm, ''); // Drops manual separators
          notes = notes.replace(/[ \t]+\n/g, '\n');
          notes = notes.replace(/\n{3,}/g, '\n\n');

          // 3. Enforce Google Play 500-character limit safely (avoid cutting mid-word)
          notes = notes.trim();
          if (notes.length > 500) {
            notes = notes.substring(0, 500).split(' ').slice(0, -1).join(' ') + 'â€¦';
          }

          // 4. Write to the Google Play directory structure
          if (!fs.existsSync('whatsnew')) {
            fs.mkdirSync('whatsnew');
          }
          fs.writeFileSync('whatsnew/whatsnew-en-US', notes);
          console.log('Generated whatsnew/whatsnew-en-US (Length: ' + notes.length + ')');
          "

      # Send the finished build to Google Play's public beta (Open Testing) track.
      - name: Upload to Google Play (Open Testing - Beta track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.yanukadeneth99.cueclock
          releaseFiles: app/android/app/build/outputs/bundle/release/*.aab
          releaseName: cue-clock-${{ steps.version.outputs.version }}
          track: beta
          status: completed
          whatsNewDirectory: app/whatsnew
