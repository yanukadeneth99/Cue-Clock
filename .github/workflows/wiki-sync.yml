name: Sync Wiki

on:
  push:
    branches:
      - master
    paths:
      - 'docs/wiki.md'
  workflow_dispatch:

jobs:
  sync:
    name: Push docs/wiki.md to GitHub Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push to Wiki
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # NOTE: The default GITHUB_TOKEN cannot push to *.wiki.git — a PAT is required.
          # WIKI_TOKEN must be a classic PAT with `repo` scope, or a fine-grained PAT
          # with "Contents: Read and write" on this repository.
          git clone "https://x-access-token:${WIKI_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki

          # Copy the source file as Home.md (GitHub Wiki renders this as the landing page)
          cp docs/wiki.md wiki/Home.md

          cd wiki
          git add Home.md

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to wiki — skipping commit."
          else
            git commit -m "docs: sync wiki from docs/wiki.md"
            git push
          fi
