name: Android Release

on:
  release:
    types: [published]

concurrency:
  group: android-release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy to Google Play
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        env:
          VERSION_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${VERSION_TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version string: $VERSION"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run Expo Doctor
        working-directory: app
        run: npx expo-doctor
        continue-on-error: true

      - name: Update version code and name for release
        working-directory: app
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e "
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          const versionCode = Math.floor(Date.now() / 1000);
          app.expo.android.versionCode = versionCode;
          app.expo.version = process.env.VERSION;
          app.expo.ios.buildNumber = versionCode.toString();
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          console.log('Updated version string to', process.env.VERSION, 'and code to', versionCode);
          "

      - name: Create .env with build-time secrets
        working-directory: app
        run: |
          echo "EXPO_PUBLIC_CLARITY_KEY=${{ secrets.EXPO_PUBLIC_CLARITY_KEY }}" > .env
          echo "EAS_PROJECT_ID=${{ secrets.EAS_PROJECT_ID }}" >> .env
          echo "EAS_OWNER=${{ secrets.EAS_OWNER }}" >> .env

      - name: Decode Firebase config
        working-directory: app
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > google-services.json

      - name: Generate Android native project
        working-directory: app
        run: npx expo prebuild --platform android --clean

      - name: Decode keystore
        working-directory: app/android
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release AAB
        working-directory: app/android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Generate Clean Release Notes
        working-directory: app
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          node -e "
          const fs = require('fs');
          let notes = process.env.RELEASE_BODY;

          // 1. Fallback for manual triggers
          if (!notes || notes.trim() === '') {
            notes = 'Bug fixes and performance improvements for Cue Clock.';
          }

          // 2. Strip Markdown Formatting
          notes = notes.replace(/[#*_~\`>]/g, ''); // Removes headers, bold, italics, code blocks, quotes
          notes = notes.replace(/\[([^\]]+)\]\([^)]+\)/g, '\$1'); // Converts [Link Text](https://...) to just 'Link Text'
          notes = notes.replace(/^\s*[-+]\s+/gm, '• '); // Converts markdown dashes to nice readable bullets

          // 3. Enforce Google Play 500-character limit safely (avoid cutting mid-word)
          notes = notes.trim();
          if (notes.length > 500) {
            notes = notes.substring(0, 500).split(' ').slice(0, -1).join(' ') + '…';
          }

          // 4. Write to the Google Play directory structure
          if (!fs.existsSync('whatsnew')) {
            fs.mkdirSync('whatsnew');
          }
          fs.writeFileSync('whatsnew/whatsnew-en-US', notes);
          console.log('Generated whatsnew/whatsnew-en-US (Length: ' + notes.length + ')');
          "

      - name: Upload to Google Play (Closed Testing - Alpha track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.yanukadeneth99.cueclock
          releaseFiles: app/android/app/build/outputs/bundle/release/*.aab
          releaseName: cue-clock-${{ steps.version.outputs.version }}
          track: alpha
          status: completed
          whatsNewDirectory: app/whatsnew
