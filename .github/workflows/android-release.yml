name: Android Release

on:
  release:
    types: [created, published]

# Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Google Play
    runs-on: ubuntu-latest

    steps:
      - name: Extract version code from tag
        id: version
        run: |
          # Extract tag name (e.g., v1.0.33 -> 1.0.33)
          VERSION_TAG="${{ github.event.release.tag_name }}"
          VERSION="${VERSION_TAG#v}"

          # Parse semantic version (major.minor.patch)
          IFS='.' read -r major minor patch <<< "$VERSION"

          # Calculate version code: (major * 1000) + (minor * 100) + patch
          VERSION_CODE=$((major * 1000 + minor * 100 + patch))

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION, versionCode: $VERSION_CODE"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          # Remove unnecessary SDK components and large unneeded packages
          # (preserve /opt/hostedtoolcache for Java)
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          echo "Disk space after cleanup:"
          df -h

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run Expo Doctor
        working-directory: app
        run: npx expo-doctor
        continue-on-error: true

      - name: Update version code for release
        working-directory: app
        run: |
          node -e "
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          const versionCode = ${{ steps.version.outputs.version_code }};
          app.expo.android.versionCode = versionCode;
          app.expo.ios.buildNumber = versionCode.toString();
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          console.log('Updated version code to', versionCode);
          "

      - name: Generate Android native project
        working-directory: app
        run: npx expo prebuild --platform android --clean

      - name: Restrict build to arm64-v8a only
        working-directory: app/android
        run: echo "reactNativeArchitectures=arm64-v8a" >> gradle.properties

      - name: Decode Firebase config
        working-directory: app
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > google-services.json

      - name: Decode keystore
        working-directory: app/android
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release AAB
        working-directory: app/android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Google Play (Closed Beta track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.yanukadeneth99.cueclock
          releaseFiles: app/android/app/build/outputs/bundle/release/*.aab
          releaseName: cue-clock-1
          track: beta
          status: draft
          releaseNotes: ${{ github.event.release.body }}
