# =============================================================================
# Android Release Verify (PR dry-run)
# -----------------------------------------------------------------------------
# Purpose:    Catch release-build regressions BEFORE they hit master or a
#             release tag. Mirrors the release build pipeline end-to-end
#             using throwaway credentials, so a Gradle break, missing
#             dependency, or broken plugin surfaces on the PR — not at 2am
#             when someone tags v0.1.0.
#
# Trigger:    Pull requests that touch `app/**` or any release workflow.
#
# Inputs:     None from secrets. Uses a hardcoded dummy version (0.0.24),
#             a stub `google-services.json`, and a freshly-generated
#             throwaway keystore. The output AAB is NEVER uploaded to Play.
#
# Output:     A signed-but-disposable AAB. Job pass/fail is the value;
#             the artifact itself is discarded.
#
# Why both `android-beta.yml` and `android-promote.yml` are in the path
# filter: edits to either workflow should be sanity-checked before merge,
# even though this dry-run only exercises the build path (promotion doesn't
# build, so its changes get caught by review + a real promotion run).
# =============================================================================
name: Android Release Verify

on:
  pull_request:
    paths:
      - '.github/workflows/android-beta.yml'
      - '.github/workflows/android-promote.yml'
      - '.github/workflows/android-release-verify.yml'
      - 'app/**'

concurrency:
  group: android-release-verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-release-build:
    name: Verify Android Release Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run Expo Doctor
        working-directory: app
        run: npx expo-doctor

      - name: Update version for dry-run
        working-directory: app
        env:
          VERSION: 0.0.24
          VERSION_CODE: ${{ github.run_number }}
        run: node scripts/prepare-android-release.js

      - name: Create stub .env
        working-directory: app
        run: |
          echo "EAS_PROJECT_ID=dev-local-open-source" > .env
          echo "EAS_OWNER=open-source-contributor" >> .env
          echo "EXPO_PUBLIC_CLARITY_KEY=" >> .env

      - name: Create stub google-services.json
        working-directory: app
        run: |
          cat > google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "cue-clock-ci",
              "storage_bucket": "cue-clock-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:1234567890abcdef123456",
                  "android_client_info": {
                    "package_name": "com.yanukadeneth99.cueclock"
                  }
                },
                "api_key": [{ "current_key": "fake-api-key" }]
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Generate Android native project
        working-directory: app
        run: npx expo prebuild --platform android --clean

      - name: Sync Android native version after prebuild
        working-directory: app
        env:
          VERSION: 0.0.24
          VERSION_CODE: ${{ github.run_number }}
        run: node scripts/prepare-android-release.js --sync-native

      - name: Generate throwaway signing keystore
        working-directory: app/android
        run: |
          keytool -genkeypair \
            -alias androidreleasekey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype JKS \
            -keystore release.keystore \
            -storepass android \
            -keypass android \
            -dname "CN=Cue Clock Dry Run, OU=CI, O=Cue Clock, L=Colombo, S=Western, C=LK"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release AAB
        working-directory: app/android
        run: |
          ./gradlew bundleRelease \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a,x86,x86_64 \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androidreleasekey \
            -Pandroid.injected.signing.key.password=android
