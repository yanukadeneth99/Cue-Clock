# =============================================================================
# Android Release Verify (PR dry-run)
# -----------------------------------------------------------------------------
# A practice run of the release build on every pull request, so a broken build
# is caught while the PR is still open — not at 2am when someone tags a real
# release. It builds the app exactly like a release would, then throws the
# result away.
#
# Runs on:  pull requests that touch app/ or any of the release workflows.
#
# Uses:     NO real secrets. A dummy version number (0.0.24), a fake Firebase
#           config, and a signing key generated on the spot and discarded.
#           Nothing is ever uploaded to Google Play — pass/fail is the point.
#
# Why android-beta.yml and android-promote.yml are in the trigger list:
#           edits to either release workflow should get this sanity check
#           before merge, even though this dry-run only exercises the build
#           path (promotion doesn't build, so its changes get caught by
#           review + a real promotion run).
# =============================================================================
name: Android Release Verify

on:
  pull_request:
    paths:
      - '.github/workflows/android-beta.yml'
      - '.github/workflows/android-promote.yml'
      - '.github/workflows/android-release-verify.yml'
      - 'app/**'

# If new commits land on the same PR while a check is running, cancel the old
# check — only the newest code needs verifying.
concurrency:
  group: android-release-verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-release-build:
    name: Verify Android Release Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"

      - name: Install dependencies
        working-directory: app
        run: npm ci

      # Health check: fails early if any library versions don't match what
      # this Expo SDK expects.
      - name: Run Expo Doctor
        working-directory: app
        run: npx expo-doctor

      # Stamp a fixed dummy version — the number is meaningless because this
      # build is never shipped anywhere.
      - name: Update version for dry-run
        working-directory: app
        env:
          VERSION: 0.0.24
          VERSION_CODE: ${{ github.run_number }}
        run: node scripts/prepare-android-release.js

      # Placeholder settings instead of real secrets — a PR from a fork must
      # be buildable without access to any of them.
      - name: Create stub .env
        working-directory: app
        run: |
          echo "EAS_PROJECT_ID=dev-local-open-source" > .env
          echo "EAS_OWNER=open-source-contributor" >> .env
          echo "EXPO_PUBLIC_CLARITY_KEY=" >> .env

      # A fake Firebase config with the right shape — enough to make the
      # build succeed without touching any real Firebase project.
      - name: Create stub google-services.json
        working-directory: app
        run: |
          cat > google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "cue-clock-ci",
              "storage_bucket": "cue-clock-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:1234567890abcdef123456",
                  "android_client_info": {
                    "package_name": "com.yanukadeneth99.cueclock"
                  }
                },
                "api_key": [{ "current_key": "fake-api-key" }]
              }
            ],
            "configuration_version": "1"
          }
          EOF

      # Generate the native Android project folder from the Expo config —
      # this is what Gradle actually builds below.
      - name: Generate Android native project
        working-directory: app
        run: npx expo prebuild --platform android --clean

      # Prebuild regenerates the native project, wiping the version stamped
      # earlier — so stamp it again directly into the native files.
      - name: Sync Android native version after prebuild
        working-directory: app
        env:
          VERSION: 0.0.24
          VERSION_CODE: ${{ github.run_number }}
        run: node scripts/prepare-android-release.js --sync-native

      # Make a brand-new signing key just for this run (real releases use the
      # secret production key; this one is discarded with the runner).
      - name: Generate throwaway signing keystore
        working-directory: app/android
        run: |
          keytool -genkeypair \
            -alias androidreleasekey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype JKS \
            -keystore release.keystore \
            -storepass android \
            -keypass android \
            -dname "CN=Cue Clock Dry Run, OU=CI, O=Cue Clock, L=Colombo, S=Western, C=LK"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release AAB
        working-directory: app/android
        run: |
          # ARM-only: must mirror android-beta.yml / android-internal.yml so
          # this dry-run verifies the exact ABI set production ships. x86/x86_64
          # were dropped — their native splits crashed emulators/ChromeOS with
          # SoLoaderDSONotFoundError (missing libc++_shared.so).
          ./gradlew bundleRelease \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androidreleasekey \
            -Pandroid.injected.signing.key.password=android
