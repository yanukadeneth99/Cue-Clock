# =============================================================================
# Android Internal Testing
# -----------------------------------------------------------------------------
# Every time app code lands on master, this builds the Android app and sends it
# to Google Play "Internal Testing" — a private, invite-only track where the
# developer and close testers try changes first. It's the fastest feedback loop.
#
# Runs on:  a push to master that changes anything under app/. Website- or
#           docs-only changes skip this build.
#
# Version:  no human ever bumps version numbers by hand. A script
#           (app/scripts/derive-internal-version.js) reads the latest git tag
#           to pick the version name (tag vX.Y.Z → X.Y.(Z+1); tag
#           vX.Y.Z-beta.N → X.Y.Z), and the build timestamp becomes Google
#           Play's required always-increasing version code.
#
# Note:     EXPO_PUBLIC_DEBUG_LOGS=1 is set ONLY here — it unlocks the in-app
#           debug log viewer. Beta and production builds must never get it.
#
# Related:  android-beta.yml (public beta on pre-release tags),
#           android-promote.yml (moves a beta build to production).
# =============================================================================
name: Android Internal Testing

on:
  push:
    branches:
      - master
    paths:
      - "app/**"

# If a new push arrives while a build is still running, cancel the old build —
# only the newest code matters for internal testing.
concurrency:
  group: android-internal
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy to Internal Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch all tags — the in-flight versionName is derived from them.
          # actions/checkout's default shallow clone has none.
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      # Health check: fails the build early if any library versions don't
      # match what this Expo SDK expects.
      - name: Run Expo Doctor
        working-directory: app
        run: npx expo-doctor

      # Derive versionName from git tags (no manual app.json bump ever) and
      # set a fresh timestamped versionCode. Rule:
      #   latest tag = vX.Y.Z       → in-flight versionName = X.Y.(Z+1)
      #   latest tag = vX.Y.Z-beta.N → in-flight versionName = X.Y.Z
      #   no matching tags          → fall back to app.json's expo.version
      - name: Derive internal versionName and versionCode
        working-directory: app
        run: node scripts/derive-internal-version.js

      - name: Create .env with build-time secrets
        working-directory: app
        run: |
          echo "EXPO_PUBLIC_CLARITY_KEY=${{ secrets.EXPO_PUBLIC_CLARITY_KEY }}" > .env
          echo "EAS_PROJECT_ID=${{ secrets.EAS_PROJECT_ID }}" >> .env
          echo "EAS_OWNER=${{ secrets.EAS_OWNER }}" >> .env
          # Internal-only: enables the in-app debug log viewer. NEVER added to
          # android-beta.yml or android-promote.yml so beta + production builds
          # ship with logging inert.
          echo "EXPO_PUBLIC_DEBUG_LOGS=1" >> .env

      # Recreate google-services.json (the Firebase config file, kept out of
      # the public repo) from a repository secret.
      - name: Decode Firebase config
        working-directory: app
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > google-services.json

      # Generate the native Android project folder from the Expo config —
      # this is what Gradle actually builds in the next steps.
      - name: Generate Android native project
        working-directory: app
        run: |
          export EAS_PROJECT_ID=${{ secrets.EAS_PROJECT_ID }}
          export EAS_OWNER=${{ secrets.EAS_OWNER }}
          export EXPO_PUBLIC_CLARITY_KEY=${{ secrets.EXPO_PUBLIC_CLARITY_KEY }}
          npx expo prebuild --platform android --clean

      # Recreate the app-signing key from a secret. Google Play only accepts
      # updates signed with this exact key, so it must never be lost or leaked.
      - name: Decode keystore
        working-directory: app/android
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release AAB
        working-directory: app/android
        run: |
          # ARM-only: every real Android phone is ARM. Shipping x86/x86_64
          # native splits only served emulators/ChromeOS a broken bundle —
          # the x86_64 split was missing libc++_shared.so, fatally crashing
          # RN's New Architecture at MainApplication.onCreate (Crashlytics:
          # SoLoaderDSONotFoundError). Dropping them also shrinks the AAB.
          ./gradlew bundleRelease \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      # Send the finished build to Google Play's invite-only Internal track.
      - name: Upload to Google Play (Internal Testing track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.yanukadeneth99.cueclock
          releaseFiles: app/android/app/build/outputs/bundle/release/*.aab
          releaseName: cue-clock-${{ github.run_number }}
          track: internal
          status: completed
