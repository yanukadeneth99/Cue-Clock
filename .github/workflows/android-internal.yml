# =============================================================================
# Android Internal Testing
# -----------------------------------------------------------------------------
# Purpose:    Build a signed AAB on every master push that touches `app/**`
#             and ship it to Google Play's Internal Testing track. The
#             smallest, fastest feedback loop for developers + close testers.
#
# Trigger:    Push to `master` with changes under `app/**`. Skipped for
#             website/docs-only changes.
#
# Inputs:     `versionName` is auto-derived from git tags by
#             `app/scripts/derive-internal-version.js`:
#               - latest tag = vX.Y.Z       → internal versionName = X.Y.(Z+1)
#               - latest tag = vX.Y.Z-beta.N → internal versionName = X.Y.Z
#             `versionCode` = unix timestamp so each push gets a fresh code
#             monotonically. No human ever bumps `app.json` by hand.
#
# Output:     Signed AAB on the `internal` track with release name
#             `cue-clock-<run_number>`. Internal track is invite-only.
#
# Notes:      `EXPO_PUBLIC_DEBUG_LOGS=1` is set ONLY here — gates the in-app
#             debug log viewer. Production builds must never see this flag.
#
# Related:    `android-beta.yml` (Open Testing on pre-release tags).
#             `android-promote.yml` (production promotion on full release).
# =============================================================================
name: Android Internal Testing

on:
  push:
    branches:
      - master
    paths:
      - "app/**"

concurrency:
  group: android-internal
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy to Internal Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch all tags — the in-flight versionName is derived from them.
          # actions/checkout's default shallow clone has none.
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run Expo Doctor
        working-directory: app
        run: npx expo-doctor

      # Derive versionName from git tags (no manual app.json bump ever) and
      # set a fresh timestamped versionCode. Rule:
      #   latest tag = vX.Y.Z       → in-flight versionName = X.Y.(Z+1)
      #   latest tag = vX.Y.Z-beta.N → in-flight versionName = X.Y.Z
      #   no matching tags          → fall back to app.json's expo.version
      - name: Derive internal versionName and versionCode
        working-directory: app
        run: node scripts/derive-internal-version.js

      - name: Create .env with build-time secrets
        working-directory: app
        run: |
          echo "EXPO_PUBLIC_CLARITY_KEY=${{ secrets.EXPO_PUBLIC_CLARITY_KEY }}" > .env
          echo "EAS_PROJECT_ID=${{ secrets.EAS_PROJECT_ID }}" >> .env
          echo "EAS_OWNER=${{ secrets.EAS_OWNER }}" >> .env
          # Internal-only: enables the in-app debug log viewer. NEVER added to
          # android-beta.yml or android-promote.yml so beta + production builds
          # ship with logging inert.
          echo "EXPO_PUBLIC_DEBUG_LOGS=1" >> .env

      - name: Decode Firebase config
        working-directory: app
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > google-services.json

      - name: Generate Android native project
        working-directory: app
        run: |
          export EAS_PROJECT_ID=${{ secrets.EAS_PROJECT_ID }}
          export EAS_OWNER=${{ secrets.EAS_OWNER }}
          export EXPO_PUBLIC_CLARITY_KEY=${{ secrets.EXPO_PUBLIC_CLARITY_KEY }}
          npx expo prebuild --platform android --clean

      - name: Decode keystore
        working-directory: app/android
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release AAB
        working-directory: app/android
        run: |
          # ARM-only: every real Android phone is ARM. Shipping x86/x86_64
          # native splits only served emulators/ChromeOS a broken bundle —
          # the x86_64 split was missing libc++_shared.so, fatally crashing
          # RN's New Architecture at MainApplication.onCreate (Crashlytics:
          # SoLoaderDSONotFoundError). Dropping them also shrinks the AAB.
          ./gradlew bundleRelease \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Google Play (Internal Testing track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.yanukadeneth99.cueclock
          releaseFiles: app/android/app/build/outputs/bundle/release/*.aab
          releaseName: cue-clock-${{ github.run_number }}
          track: internal
          status: completed
