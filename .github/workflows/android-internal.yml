name: Android Internal Testing

on:
  push:
    branches:
      - master

concurrency:
  group: android-internal
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy to Internal Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run Expo Doctor
        working-directory: app
        run: npx expo-doctor

      # Only versionCode (integer) is updated here — app.expo.version (semver string) is intentionally
      # left as-is. Play Store only enforces versionCode uniqueness; versionName is cosmetic and only
      # needs to be accurate on the release track (handled by prepare-android-release.js in android-release.yml).
      - name: Update version code for internal testing
        working-directory: app
        run: |
          node -e "
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          const versionCode = Math.floor(Date.now() / 1000);
          app.expo.android.versionCode = versionCode;
          app.expo.ios.buildNumber = versionCode.toString();
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          console.log('Updated version code to', versionCode);
          "

      - name: Create .env with build-time secrets
        working-directory: app
        run: |
          echo "EXPO_PUBLIC_CLARITY_KEY=${{ secrets.EXPO_PUBLIC_CLARITY_KEY }}" > .env
          echo "EAS_PROJECT_ID=${{ secrets.EAS_PROJECT_ID }}" >> .env
          echo "EAS_OWNER=${{ secrets.EAS_OWNER }}" >> .env
          # Internal-only: enables the in-app debug log viewer. NEVER added to
          # android-release.yml so production builds ship with logging inert.
          echo "EXPO_PUBLIC_DEBUG_LOGS=1" >> .env

      - name: Decode Firebase config
        working-directory: app
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > google-services.json

      - name: Generate Android native project
        working-directory: app
        run: |
          export EAS_PROJECT_ID=${{ secrets.EAS_PROJECT_ID }}
          export EAS_OWNER=${{ secrets.EAS_OWNER }}
          export EXPO_PUBLIC_CLARITY_KEY=${{ secrets.EXPO_PUBLIC_CLARITY_KEY }}
          npx expo prebuild --platform android --clean

      - name: Decode keystore
        working-directory: app/android
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build release AAB
        working-directory: app/android
        run: |
          ./gradlew bundleRelease \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a,x86,x86_64 \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Google Play (Internal Testing track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.yanukadeneth99.cueclock
          releaseFiles: app/android/app/build/outputs/bundle/release/*.aab
          releaseName: cue-clock-${{ github.run_number }}
          track: internal
          status: completed
