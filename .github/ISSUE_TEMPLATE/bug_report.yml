name: Bug report
description: Report a bug or unexpected behavior in Cue Clock.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in as much detail as you can — it dramatically speeds up triage.

  - type: dropdown
    id: component
    attributes:
      label: Which part of the project?
      options:
        - Mobile app (app/)
        - Website (website/)
        - CI / build pipeline
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Web
        - N/A
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App / commit version
      placeholder: "e.g. v1.2.0, or commit sha 46a6708"
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Device / browser
      placeholder: "e.g. Pixel 8 (Android 15), iPhone 15 Pro (iOS 18), Chrome 142 on macOS"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Add a countdown for "22:00" in London timezone
        3. Enable an alert 5 minutes before
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant logs (wrapped in ```), or drag in screenshots.
    validations:
      required: false
